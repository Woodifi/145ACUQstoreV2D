<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e1014">
  <title>QStore IMS</title>
  <style>
/* =============================================================================
 * QStore IMS v2 — Global stylesheet
 * =============================================================================
 * Defence-aesthetic dark theme. Single file, imported once by index.html.
 *
 * Palette:
 *   --bg-deep      Background (charcoal, near-black)
 *   --bg-panel     Card/panel surface (slightly lighter)
 *   --bg-input     Input/key surface
 *   --border       Subtle border lines
 *   --text-primary Main text (off-white)
 *   --text-muted   Secondary text (grey)
 *   --gold         AAC accent (rank tab gold)
 *   --danger       Errors / warnings
 *   --warn         Banner warnings
 *   --good         Success
 *
 * Typography is system fonts — no web-font dependency, works offline.
 * Touch targets are 56px minimum on PIN keys; 44px elsewhere (Apple HIG).
 * ============================================================================= */

:root {
  --bg-deep:       #0e1014;
  --bg-panel:      #181c22;
  --bg-input:      #21262e;
  --bg-input-hi:   #2c333d;
  --border:        #2f3640;
  --border-hi:     #4a5260;
  --text-primary:  #e8e8e8;
  --text-muted:    #8893a0;
  --text-dim:      #5a6470;
  --gold:          #c4a96b;
  --gold-hi:       #d4ba80;
  --danger:        #ff6b6b;
  --warn:          #ffb86b;
  --good:          #6ae07a;
  --info:          #6bb0ff;

  --radius-sm:     4px;
  --radius-md:     8px;
  --radius-lg:     12px;

  --shadow-card:   0 8px 24px rgba(0, 0, 0, 0.4);
  --shadow-modal:  0 16px 48px rgba(0, 0, 0, 0.6);
}

* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
               Helvetica, Arial, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

button {
  font: inherit;
  cursor: pointer;
}

button:focus-visible,
input:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

input {
  font: inherit;
}

/* =============================================================================
 * LOGIN
 * ============================================================================= */

.login {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login__card {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  width: 100%;
  max-width: 440px;
  overflow: hidden;
  transition: transform 80ms ease;
}

.login__card.is-shaking {
  animation: login-shake 400ms cubic-bezier(.36, .07, .19, .97);
}

@keyframes login-shake {
  10%, 90% { transform: translateX(-2px); }
  20%, 80% { transform: translateX(4px); }
  30%, 50%, 70% { transform: translateX(-8px); }
  40%, 60% { transform: translateX(8px); }
}

.login__header {
  padding: 24px 28px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
  display: flex;
  align-items: center;
  gap: 16px;
}

.login__title {
  margin: 0;
  font-size: 20px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.3px;
}

.login__subtitle {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.login__back {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  padding: 6px 12px;
  font-size: 13px;
}

.login__back:hover {
  background: var(--bg-input);
  color: var(--text-primary);
}

.login__user-summary {
  flex: 1;
}

.login__user-summary .login__user-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}

.login__user-summary .login__user-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.login__body {
  padding: 24px 28px 28px;
}

.login__heading {
  margin: 0 0 4px;
  font-size: 16px;
  font-weight: 600;
}

.login__hint {
  margin: 0 0 16px;
  font-size: 13px;
  color: var(--text-muted);
}

.login__user-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 50vh;
  overflow-y: auto;
}

.login__user-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  text-align: left;
  min-height: 56px;
  transition: background 80ms ease, border-color 80ms ease;
}

.login__user-btn:hover {
  background: var(--bg-input-hi);
  border-color: var(--border-hi);
}

.login__user-btn .login__user-name {
  font-weight: 600;
  font-size: 15px;
}

.login__user-btn .login__user-meta {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--text-muted);
}

.login__user-role {
  color: var(--gold);
  font-weight: 600;
}

.login__empty {
  padding: 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
}

/* PIN display */

.login__pin-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
  position: relative;
  min-height: 60px;
}

.login__pin-dot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  font-size: 24px;
  color: var(--text-dim);
  transition: color 80ms ease, transform 80ms ease;
}

.login__pin-dot.is-filled {
  color: var(--gold);
  transform: scale(1.05);
}

.login__pin-display.is-revealed .login__pin-dot.is-filled {
  font-size: 22px;
  font-family: 'SF Mono', Consolas, monospace;
  font-weight: 600;
}

.login__pin-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
}

.login__pin-toggle:hover {
  background: var(--bg-input-hi);
  color: var(--text-primary);
}

.login__error {
  min-height: 20px;
  padding: 4px 0 12px;
  font-size: 13px;
  color: var(--danger);
  text-align: center;
}

.login__error:empty {
  padding: 0;
  min-height: 0;
}

/* Keypad */

.login__keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.login__key {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 22px;
  font-weight: 500;
  height: 64px;
  transition: background 60ms ease, transform 60ms ease;
  user-select: none;
}

.login__key:hover {
  background: var(--bg-input-hi);
}

.login__key:active {
  transform: scale(0.96);
  background: var(--border-hi);
}

.login__key--clear,
.login__key--backspace {
  font-size: 16px;
  color: var(--text-muted);
}

.login__key--clear:hover,
.login__key--backspace:hover {
  color: var(--text-primary);
}

/* =============================================================================
 * SHELL (post-login)
 * ============================================================================= */

.shell {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 100vh;
}

.shell__header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
}

.shell__brand {
  flex: 1;
}

.shell__brand-name {
  font-size: 18px;
  font-weight: 600;
  color: var(--gold);
}

.shell__brand-code {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

.shell__session {
  text-align: right;
  margin-right: 8px;
}

.shell__session-name {
  font-size: 14px;
  font-weight: 600;
}

.shell__session-role {
  font-size: 11px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.shell__logout {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
}

.shell__logout:hover {
  border-color: var(--danger);
  color: var(--danger);
}

.shell__banner {
  padding: 12px 24px;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.shell__banner--warn {
  background: rgba(255, 184, 107, 0.08);
  color: var(--warn);
  border-bottom-color: rgba(255, 184, 107, 0.3);
}

.shell__banner-action {
  margin-left: auto;
  background: var(--warn);
  color: #2a1f0a;
  border: none;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
}

.shell__banner-action:hover {
  background: #ffc887;
}

.shell__placeholder {
  width: 100%;
  max-width: 600px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  margin: 32px auto;
}

.shell__placeholder h2 {
  margin: 0 0 12px;
  font-size: 18px;
  color: var(--gold);
}

.shell__placeholder p {
  margin: 0 0 20px;
  color: var(--text-muted);
}

.shell__session-detail {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 8px 16px;
  margin: 0;
}

.shell__session-detail dt {
  color: var(--text-muted);
  font-size: 13px;
}

.shell__session-detail dd {
  margin: 0;
  font-size: 14px;
  color: var(--text-primary);
}

/* =============================================================================
 * MODAL
 * ============================================================================= */

.modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.modal[hidden] {
  display: none;
}

.modal__backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
}

.modal__panel {
  position: relative;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-modal);
  padding: 24px 28px;
  width: 100%;
  max-width: 420px;
}

.modal__title {
  margin: 0 0 8px;
  font-size: 18px;
  color: var(--gold);
}

.modal__body {
  margin: 0 0 16px;
  font-size: 14px;
  color: var(--text-muted);
}

.modal__form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.modal__label {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.modal__input {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 10px 12px;
  font-size: 16px;
  letter-spacing: 0.5em;
  text-align: center;
  font-family: 'SF Mono', Consolas, monospace;
}

.modal__error {
  min-height: 20px;
  font-size: 13px;
  color: var(--danger);
}

.modal__error:empty {
  min-height: 0;
}

.modal__actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 8px;
}

/* =============================================================================
 * BUTTONS
 * ============================================================================= */

.btn {
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-primary);
  transition: background 80ms ease;
}

.btn--primary {
  background: var(--gold);
  color: #1a1408;
  border-color: var(--gold);
}

.btn--primary:hover {
  background: var(--gold-hi);
}

.btn--ghost {
  border-color: var(--border);
  color: var(--text-muted);
}

.btn--ghost:hover {
  background: var(--bg-input);
  color: var(--text-primary);
}

/* =============================================================================
 * FATAL ERROR
 * ============================================================================= */

.fatal {
  padding: 48px 24px;
  max-width: 600px;
  margin: 0 auto;
}

.fatal h1 {
  color: var(--danger);
  font-size: 22px;
  margin: 0 0 12px;
}

.fatal__detail {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  color: var(--danger);
  white-space: pre-wrap;
  word-break: break-word;
}

/* =============================================================================
 * SHELL NAV (added for multi-page layout)
 * ============================================================================= */

.shell__nav {
  display: flex;
  gap: 4px;
  flex: 1;
  margin: 0 16px;
}

.shell__nav-link {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-muted);
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

.shell__nav-link:hover {
  background: var(--bg-input);
  color: var(--text-primary);
}

.shell__nav-link.is-active {
  background: var(--bg-input-hi);
  color: var(--gold);
  border-color: var(--border);
}

.shell__main {
  flex: 1;
  /* override the centered placeholder layout from the earlier rule */
  padding: 0;
  display: block;
}

.shell__loading {
  padding: 48px 24px;
  text-align: center;
  color: var(--text-muted);
}

/* =============================================================================
 * INVENTORY PAGE
 * ============================================================================= */

.inv {
  padding: 20px 24px;
  max-width: 1400px;
  margin: 0 auto;
}

.inv__toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.inv__filters {
  display: flex;
  gap: 8px;
  flex: 1;
  flex-wrap: wrap;
}

.inv__search {
  flex: 1;
  min-width: 220px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 14px;
}

.inv__cat-filter {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 14px;
  min-width: 160px;
}

.inv__actions {
  display: flex;
  gap: 8px;
}

.inv__meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.inv__meta-of {
  color: var(--text-dim);
}

.inv__table-wrap {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: auto;
}

.inv__table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.inv__table thead th {
  background: var(--bg-input);
  color: var(--text-muted);
  text-align: left;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.5px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.inv__table tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.inv__row:hover td {
  background: rgba(255, 255, 255, 0.02);
}

.inv__col-nsn   { width: 130px; }
.inv__col-photo { width: 56px; }
.inv__col-cat   { width: 120px; }
.inv__col-qty   { width: 60px; text-align: right; }
.inv__col-cond  { width: 130px; }
.inv__col-loc   { width: 120px; }
.inv__col-actions { width: 130px; text-align: right; }

.inv__nsn {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  color: var(--text-primary);
}

.inv__name {
  font-weight: 600;
  color: var(--text-primary);
}

.inv__notes {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.inv__qty-with-bar {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.inv__progress {
  display: block;
  width: 50px;
  height: 3px;
  background: var(--bg-input);
  border-radius: 2px;
  overflow: hidden;
}

.inv__progress-fill {
  display: block;
  height: 100%;
  background: var(--good);
}

.inv__progress-fill.is-mid  { background: var(--warn); }
.inv__progress-fill.is-low  { background: var(--danger); }

.inv__col-qty--loan  { color: var(--info); }
.inv__col-qty--unsvc { color: var(--warn); }

.inv__cond {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  background: rgba(106, 224, 122, 0.15);
  color: var(--good);
}

.inv__cond--unserviceable    { background: rgba(255, 184, 107, 0.15); color: var(--warn); }
.inv__cond--repair           { background: rgba(107, 176, 255, 0.15); color: var(--info); }
.inv__cond--calibration-due  { background: rgba(196, 169, 107, 0.15); color: var(--gold); }
.inv__cond--written-off      { background: rgba(255, 107, 107, 0.15); color: var(--danger); }

.inv__row-actions {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

.inv__thumb,
.inv__thumb-placeholder {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  display: block;
  cursor: pointer;
  background: var(--bg-input);
  border: 1px solid var(--border);
}

.inv__thumb-placeholder {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-muted);
}

.inv__thumb:hover,
.inv__thumb-placeholder:hover {
  border-color: var(--gold);
}

.inv__empty {
  padding: 60px 24px;
  text-align: center;
  color: var(--text-muted);
}

.inv__empty h3 {
  margin: 0 0 8px;
  color: var(--text-primary);
  font-size: 16px;
}

.inv__empty p {
  margin: 0 0 20px;
  font-size: 14px;
}

/* =============================================================================
 * MODAL — additions for size variants and content layout
 * ============================================================================= */

.modal__panel--sm { max-width: 380px; }
.modal__panel--md { max-width: 560px; }
.modal__panel--lg { max-width: 800px; }

.modal__content {
  font-size: 14px;
}

.modal__warn {
  background: rgba(255, 107, 107, 0.08);
  border: 1px solid rgba(255, 107, 107, 0.3);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin: 0 0 12px;
  font-size: 13px;
  color: var(--text-primary);
}

.modal__detail {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 4px 16px;
  margin: 0 0 16px;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-size: 13px;
}

.modal__detail dt {
  color: var(--text-muted);
}

.modal__detail dd {
  margin: 0;
  color: var(--text-primary);
}

/* =============================================================================
 * FORM (shared between modals and pages)
 * ============================================================================= */

.form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.form__row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.form__field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}

.form__field--grow {
  flex: 1;
}

.form__row > .form__field {
  flex: 1;
  min-width: 120px;
}

.form__label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}

.form__label abbr {
  color: var(--danger);
  text-decoration: none;
  margin-left: 2px;
}

.form__field input,
.form__field select,
.form__field textarea {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 14px;
  font-family: inherit;
}

.form__field textarea {
  resize: vertical;
  min-height: 60px;
}

.form__field input:focus,
.form__field select:focus,
.form__field textarea:focus {
  outline: 2px solid var(--gold);
  outline-offset: 0;
  border-color: var(--gold);
}

.form__hint {
  font-size: 11px;
  color: var(--text-dim);
  min-height: 14px;
}

.form__hint.is-good { color: var(--good); }
.form__hint.is-warn { color: var(--warn); }

.form__error {
  min-height: 20px;
  font-size: 13px;
  color: var(--danger);
  padding-top: 4px;
}

.form__error:empty {
  min-height: 0;
  padding: 0;
}

.form__actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 8px;
}

.form__input--pin {
  letter-spacing: 0.5em;
  text-align: center;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 16px;
}

/* =============================================================================
 * BUTTON variants (added for inventory)
 * ============================================================================= */

.btn--danger {
  background: var(--danger);
  color: #2a0a0a;
  border-color: var(--danger);
}

.btn--danger:hover {
  background: #ff8888;
}

.btn--sm {
  padding: 6px 10px;
  font-size: 12px;
}

/* =============================================================================
 * PHOTO UPLOAD
 * ============================================================================= */

.photo-upload {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: stretch;
}

.photo-upload__preview {
  width: 100%;
  height: 200px;
  background: var(--bg-input);
  border: 2px dashed var(--border);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 80ms ease, background 80ms ease;
  overflow: hidden;
}

.photo-upload[data-target="drop"]:hover .photo-upload__preview,
.photo-upload[data-target="drop"].is-drag .photo-upload__preview {
  border-color: var(--gold);
  background: var(--bg-input-hi);
}

.photo-upload__preview img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: var(--radius-sm);
}

.photo-upload__placeholder {
  color: var(--text-muted);
  font-size: 13px;
}

.photo-upload__hint {
  margin: 0;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}

/* =============================================================================
 * SHELL SYNC INDICATOR
 * ============================================================================= */

.shell__sync {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  cursor: pointer;
  background: transparent;
  border: 1px solid transparent;
  transition: background 80ms ease, border-color 80ms ease;
  user-select: none;
}

.shell__sync:hover {
  background: var(--bg-input);
  border-color: var(--border);
}

.shell__sync-icon {
  font-size: 14px;
  font-weight: 600;
}

.shell__sync-label {
  font-weight: 500;
}

.shell__sync--unconfigured  { color: var(--text-dim); }
.shell__sync--not-signed-in { color: var(--text-muted); }
.shell__sync--signed-in     { color: var(--good); }
.shell__sync--busy          { color: var(--info); }
.shell__sync--busy .shell__sync-icon { animation: sync-spin 1.5s linear infinite; display: inline-block; }
.shell__sync--error         { color: var(--danger); }

@keyframes sync-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* =============================================================================
 * SETTINGS PAGE
 * ============================================================================= */

.settings {
  padding: 24px;
  max-width: 900px;
  margin: 0 auto;
}

.settings__column {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.settings__section {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
}

.settings__section-header {
  margin-bottom: 16px;
}

.settings__section-title {
  margin: 0 0 6px;
  font-size: 18px;
  color: var(--gold);
}

.settings__section-hint {
  margin: 0;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
}

.settings__sync-status {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 16px;
  display: grid;
  gap: 8px;
}

.settings__sync-state {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 14px;
}

.settings__sync-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text-dim);
}

.settings__sync-status--signed-in  .settings__sync-dot { background: var(--good); }
.settings__sync-status--busy       .settings__sync-dot { background: var(--info); animation: sync-pulse 1.5s ease-in-out infinite; }
.settings__sync-status--error      .settings__sync-dot { background: var(--danger); }
.settings__sync-status--not-signed-in .settings__sync-dot { background: var(--warn); }

@keyframes sync-pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

.settings__sync-account {
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-size: 13px;
}

.settings__sync-account-name {
  color: var(--text-primary);
  font-weight: 500;
}

.settings__sync-account-mail {
  color: var(--text-muted);
  font-size: 12px;
}

.settings__sync-meta {
  font-size: 12px;
  color: var(--text-muted);
}

.settings__sync-error {
  font-size: 13px;
  color: var(--danger);
  background: rgba(255, 107, 107, 0.08);
  padding: 8px 10px;
  border-radius: var(--radius-sm);
}

.settings__sync-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 4px;
}

.settings__sync-hint {
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
}

.settings__details {
  margin-top: 16px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
  font-size: 13px;
}

.settings__details summary {
  cursor: pointer;
  color: var(--text-muted);
  font-weight: 500;
  padding: 4px 0;
}

.settings__details summary:hover {
  color: var(--text-primary);
}

.settings__details-body {
  padding-top: 12px;
  color: var(--text-muted);
}

.settings__details-body p {
  margin: 0 0 12px;
  line-height: 1.5;
}

.settings__redirect {
  display: block;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  margin: 8px 0;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  color: var(--gold);
  word-break: break-all;
  user-select: all;
}

.settings__details-body code {
  background: var(--bg-input);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  color: var(--text-primary);
}

/* Form check (checkbox + label inline) */
.form__check {
  flex-direction: row;
  align-items: center;
  gap: 8px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--text-primary);
  font-size: 14px;
}

.form__check input[type="checkbox"] {
  width: 16px;
  height: 16px;
  margin: 0;
}

/* =============================================================================
 * FLASH (transient toast)
 * ============================================================================= */

.flash {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-panel);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 18px;
  font-size: 14px;
  box-shadow: var(--shadow-modal);
  z-index: 1000;
  transition: opacity 400ms ease, transform 400ms ease;
}

.flash--success {
  border-color: var(--good);
  color: var(--good);
}

.flash.is-leaving {
  opacity: 0;
  transform: translateX(-50%) translateY(8px);
}

/* =============================================================================
 * SETTINGS — Data backup section
 * ============================================================================= */

.settings__section-meta {
  display: inline-block;
  margin-left: 10px;
  padding: 2px 8px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 400;
  color: var(--gold);
  vertical-align: middle;
  letter-spacing: 0.5px;
}

.settings__data-meta {
  display: block;
  padding: 8px 12px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  color: var(--text-muted);
}

/* =============================================================================
 * RECOVERY CODE display + status (settings + modal + login)
 * ============================================================================= */

/* The big plaintext code box shown in the modal. Monospace so each glyph is
 * unambiguous; large so the user can read it across a desk. Selectable so a
 * paranoid user can copy-paste into their password manager. */
.recovery-code__display {
  display: block;
  margin: 12px 0 16px;
  padding: 18px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 22px;
  letter-spacing: 0.15em;
  text-align: center;
  color: var(--gold);
  user-select: all;
  -webkit-user-select: all;
  word-break: break-all;
}

/* Status pill in the settings recovery section. Two flavours: ok (active)
 * and warn (no code yet). Same shape, different colour. */
.settings__status {
  margin: 0 0 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.4;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-primary);
}

.settings__status--ok {
  border-color: rgba(196, 169, 107, 0.35);
  background:   rgba(196, 169, 107, 0.06);
}

.settings__status--warn {
  border-color: rgba(255, 184, 107, 0.35);
  background:   rgba(255, 184, 107, 0.08);
}

/* "Forgot PIN?" link beneath the keypad on the login screen, OC-only. */
.login__recovery-link {
  margin-top: 14px;
  text-align: center;
}

.login__link {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 13px;
  text-decoration: underline;
  text-underline-offset: 3px;
  cursor: pointer;
  padding: 4px 8px;
}

.login__link:hover {
  color: var(--gold);
}

.login__link:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
  border-radius: 2px;
}

/* Recovery-code input field — like the PIN field but accepts the full
 * formatted code (XXXX-XXXX-XXXX). Monospace, slightly tighter spacing. */
.form__input--code {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 16px;
  letter-spacing: 0.15em;
  text-align: center;
  text-transform: uppercase;
}

/* Smaller body paragraph used inside modals when the main paragraph above
 * carries the load. Lighter colour, smaller, tighter. */
.modal__body--small {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
}

/* =============================================================================
 * CADETS page — toolbar, table, badges
 * Mirrors the inventory page conventions (.inv__*) so the two list views
 * feel like siblings. Rules duplicated rather than aliased so future
 * tweaks to one don't accidentally drag the other along.
 * ============================================================================= */

.cad__toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.cad__filters {
  display: flex;
  gap: 8px;
  flex: 1;
  flex-wrap: wrap;
  align-items: center;
}

.cad__search {
  flex: 1;
  min-width: 220px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 14px;
}

.cad__plt-filter {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 14px;
  min-width: 140px;
}

.cad__inactive-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
  padding: 4px 8px;
}

.cad__inactive-toggle input { accent-color: var(--gold); }

.cad__actions {
  display: flex;
  gap: 8px;
}

.cad__meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.cad__meta-of { color: var(--text-dim); }

.cad__table-wrap {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: auto;
}

.cad__table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.cad__table thead th {
  background: var(--bg-input);
  color: var(--text-muted);
  text-align: left;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.5px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.cad__table tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.cad__row:hover td {
  background: rgba(255, 255, 255, 0.02);
}

/* Inactive rows are visually de-emphasised — they're still listed for
 * historical loan integrity, but the muted text signals they shouldn't
 * appear in active workflows. */
.cad__row--inactive td {
  opacity: 0.55;
}

.cad__col-rank    { width: 90px; }
.cad__col-surname { width: 180px; }
.cad__col-givens  { width: 180px; }
.cad__col-svc     { width: 110px; font-family: 'SF Mono', Consolas, monospace; }
.cad__col-plt     { width: 60px; }
.cad__col-status  { width: 100px; }
.cad__col-actions { width: 130px; text-align: right; }

.cad__rank,
.cad__surname {
  font-weight: 600;
  color: var(--text-primary);
}

.cad__svc {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
}

.cad__row-actions {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

/* Badge in the status column. Same shape as inventory's .inv__cond badge. */
.cad__badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.cad__badge--staff    { background: rgba(196, 169, 107, 0.15); color: var(--gold);   }
.cad__badge--inactive { background: rgba(136, 147, 160, 0.15); color: var(--text-muted); }

.cad__empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--text-muted);
}

.cad__empty p { margin: 0 0 12px; }
.cad__empty-hint {
  font-size: 13px;
  color: var(--text-dim);
}

/* The Status field in the add/edit modal is narrower than the email
 * field next to it but should align to the same row baseline. */
.cad__active-field { flex: 0 0 140px; }

/* Inline checkbox label inside form fields. Used for the "Active"
 * checkbox in the cadet form. */
.form__checkbox-inline {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: var(--text-primary);
  cursor: pointer;
  padding: 8px 0;
}

/* =============================================================================
 * LOANS page — tabs, issue/return forms, all-loans listing
 * ============================================================================= */

/* Tab bar across the top of the page. */
.loan__tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.loan__tab {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 500;
  padding: 10px 16px;
  cursor: pointer;
  transition: color 0.1s, border-color 0.1s;
}

.loan__tab:hover { color: var(--text-primary); }

.loan__tab--active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

/* Tab body container — no special styling, just layout for kids. */
.loan__body { padding-top: 4px; }

/* Section heading inside Issue/Return tabs, used for the "1. Borrower",
 * "2. Items" steps. Smaller than page H1, less heavy than h2. */
.loan__heading {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin: 20px 0 8px;
}

.loan__heading:first-child { margin-top: 0; }

/* -----------------------------------------------------------------------------
 * Issue tab — form + sidebar layout
 * ----------------------------------------------------------------------------- */

.loan__issue {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 24px;
  align-items: start;
}

@media (max-width: 800px) {
  .loan__issue { grid-template-columns: 1fr; }
}

.loan__issue-form { min-width: 0; }

/* Per-line item row inside the batch-issue list. Item search takes most
 * of the width; qty is narrow; remove button is a square. */
.loan__lines { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }

.loan__line {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.loan__qty-field { flex: 0 0 80px; }
.loan__qty-field input { text-align: right; }

.loan__line-remove {
  flex: 0 0 32px;
  width: 32px;
  height: 36px;
  padding: 0;
  font-size: 18px;
  line-height: 1;
  align-self: flex-end;
  margin-bottom: 0;
}

.loan__line-spacer { flex: 0 0 32px; }

.loan__item-search {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 14px;
  width: 100%;
}

.loan__borrower-search {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 14px;
  width: 100%;
  max-width: 460px;
}

/* Sidebar showing the borrower's existing active loans. Sticks to the
 * right side of the form on wide screens, drops below on narrow. */
.loan__sidebar {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
}

.loan__sidebar-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  margin: 0 0 4px;
}

.loan__sidebar-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin: 0 0 12px;
}

.loan__sidebar-subhead {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin: 0 0 6px;
}

.loan__sidebar-list {
  list-style: none;
  padding: 0;
  margin: 0;
  font-size: 12px;
  color: var(--text-primary);
}

.loan__sidebar-list li {
  padding: 6px 0;
  border-top: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.loan__sidebar-list li:first-child { border-top: none; }

.loan__sidebar-ref {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 11px;
  color: var(--gold);
}

.loan__sidebar-due {
  width: 100%;
  font-size: 11px;
  color: var(--text-muted);
}

.loan__sidebar-empty {
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
  margin: 0;
}

/* -----------------------------------------------------------------------------
 * Return tab — borrower picker + checkbox list
 * ----------------------------------------------------------------------------- */

.loan__return-list {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 8px;
  margin-bottom: 8px;
}

.loan__return-row {
  display: grid;
  grid-template-columns: 24px 90px 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--text-primary);
}

.loan__return-row:hover { background: rgba(255, 255, 255, 0.03); }

.loan__return-row--overdue { color: var(--danger); }

.loan__return-ref {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  color: var(--gold);
}

.loan__return-due {
  font-size: 12px;
  color: var(--text-muted);
  text-align: right;
}

.loan__return-row--overdue .loan__return-due { color: var(--danger); font-weight: 600; }

.loan__return-actions {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}

/* -----------------------------------------------------------------------------
 * All loans tab — pill filters + table
 * ----------------------------------------------------------------------------- */

.loan__all-toolbar {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 8px;
}

.loan__all-filters {
  display: flex;
  gap: 12px;
  flex: 1;
  align-items: center;
  flex-wrap: wrap;
}

.loan__all-search {
  flex: 1;
  min-width: 220px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 14px;
}

.loan__all-pills {
  display: flex;
  gap: 4px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 3px;
}

.loan__pill {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 3px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.loan__pill:hover { color: var(--text-primary); }

.loan__pill--active {
  background: var(--bg-panel);
  color: var(--gold);
}

.loan__pill-count {
  font-size: 11px;
  background: rgba(255, 255, 255, 0.05);
  padding: 1px 6px;
  border-radius: 8px;
  color: var(--text-muted);
}

.loan__pill--active .loan__pill-count { color: var(--gold); }

.loan__meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.loan__meta-of { color: var(--text-dim); }

.loan__table-wrap {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: auto;
}

.loan__table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.loan__table thead th {
  background: var(--bg-input);
  color: var(--text-muted);
  text-align: left;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.5px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.loan__table tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.loan__row:hover td { background: rgba(255, 255, 255, 0.02); }

.loan__row--returned td { opacity: 0.55; }

.loan__ref,
.loan__date {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  white-space: nowrap;
}

.loan__ref { color: var(--gold); }

.loan__qty {
  text-align: right;
  font-weight: 600;
  width: 50px;
}

.loan__nsn {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'SF Mono', Consolas, monospace;
}

/* Status badges in the loans table — same shape as cadet/inv badges. */
.loan__badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.loan__badge--active   { background: rgba(106, 224, 122, 0.15); color: var(--good);   }
.loan__badge--overdue  { background: rgba(255, 107, 107, 0.15); color: var(--danger); }
.loan__badge--returned { background: rgba(136, 147, 160, 0.15); color: var(--text-muted); }

.loan__empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--text-muted);
}

.loan__empty p { margin: 0; }

/* Confirmation modal — list of just-issued loans. */
.loan__confirm-list {
  list-style: none;
  padding: 0;
  margin: 12px 0;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.loan__confirm-list li {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-primary);
}

.loan__confirm-list li:first-child { border-top: none; }

.loan__confirm-ref {
  font-family: 'SF Mono', Consolas, monospace;
  color: var(--gold);
  margin-right: 8px;
}

/* =============================================================================
 * AUDIT log viewer — toolbar, verify block, table
 * ============================================================================= */

.aud__toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.aud__filters {
  display: flex;
  gap: 8px;
  flex: 1;
  flex-wrap: wrap;
}

.aud__search {
  flex: 1;
  min-width: 220px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 14px;
}

.aud__action-filter {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 9px 12px;
  font-size: 14px;
  min-width: 200px;
}

.aud__actions { display: flex; gap: 8px; }

/* Verify-chain banner — shown after the user clicks the verify button.
 * Two flavours: ok (green tint) and bad (danger tint). Both span the
 * full width of the toolbar/table area. */
.aud__verify {
  margin: 0 0 12px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.5;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-primary);
}

.aud__verify code {
  background: rgba(255, 255, 255, 0.08);
  padding: 1px 6px;
  border-radius: 3px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
}

.aud__verify--ok {
  border-color: rgba(106, 224, 122, 0.35);
  background:   rgba(106, 224, 122, 0.06);
}

.aud__verify--bad {
  border-color: rgba(255, 107, 107, 0.45);
  background:   rgba(255, 107, 107, 0.08);
}

.aud__meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.aud__meta-of { color: var(--text-dim); }

.aud__table-wrap {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: auto;
}

.aud__table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.aud__table thead th {
  background: var(--bg-input);
  color: var(--text-muted);
  text-align: left;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.5px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.aud__table tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.aud__row:hover td { background: rgba(255, 255, 255, 0.02); }

/* Rows past the chain-break get a red left border + faint red background,
 * making it visually clear which entries are no longer trustworthy. */
.aud__row--broken td {
  background: rgba(255, 107, 107, 0.05);
  border-left: 2px solid var(--danger);
}

.aud__col-seq    { width: 64px; }
.aud__col-time   { width: 160px; }
.aud__col-action { width: 220px; }
.aud__col-user   { width: 140px; }
.aud__col-desc   { /* takes remaining space */ }

.aud__seq {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 11px;
  color: var(--text-muted);
  text-align: right;
}

.aud__time {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  color: var(--text-primary);
  white-space: nowrap;
}

.aud__user {
  color: var(--text-primary);
  font-weight: 500;
}

.aud__desc {
  color: var(--text-primary);
  word-break: break-word;
}

/* Action category badges. Same shape as cadet/loan/inv badges. */
.aud__badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
  margin-right: 4px;
}

.aud__badge--mutation { background: rgba(196, 169, 107, 0.15); color: var(--gold);   }
.aud__badge--security { background: rgba(107, 176, 255, 0.15); color: var(--info);   }
.aud__badge--auth     { background: rgba(106, 224, 122, 0.15); color: var(--good);   }
.aud__badge--failure  { background: rgba(255, 107, 107, 0.15); color: var(--danger); }
.aud__badge--other    { background: rgba(136, 147, 160, 0.15); color: var(--text-muted); }
.aud__badge--imported {
  background: rgba(136, 147, 160, 0.15);
  color: var(--text-muted);
  font-style: italic;
}

.aud__empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--text-muted);
}

.aud__empty p { margin: 0; }

.aud__loadmore {
  display: flex;
  justify-content: center;
  margin: 16px 0;
}

.aud__loadmore-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: 8px;
  font-weight: 400;
}

</style>
